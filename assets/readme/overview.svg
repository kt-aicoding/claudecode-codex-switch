<svg width="1120" height="520" viewBox="0 0 1120 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">claudecode-codex-switch overview</title>
  <desc id="desc">Overview of ccuse and codexuse usage paths.</desc>
  <rect width="1120" height="520" rx="28" fill="#F7F8FA"/>
  <rect x="28" y="28" width="1064" height="464" rx="24" fill="#FFFFFF" stroke="#D8DEE8"/>

  <text x="64" y="82" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="700">一张图看懂：Claude Code 和 Codex 怎么切换</text>
  <text x="64" y="116" fill="#667085" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16">安装一次，得到 ccuse 与 codexuse；全局配置适合长期默认，session 适合临时试模型或临时走代理。</text>

  <rect x="64" y="160" width="232" height="86" rx="16" fill="#111827"/>
  <text x="92" y="194" fill="#FFFFFF" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="700">install.sh</text>
  <text x="92" y="222" fill="#A7F3D0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="14">~/.local/bin</text>

  <path d="M296 203H364" stroke="#98A2B3" stroke-width="3" stroke-linecap="round"/>
  <path d="M354 193L366 203L354 213" stroke="#98A2B3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="388" y="142" width="288" height="122" rx="18" fill="#ECFDF3" stroke="#86EFAC"/>
  <text x="420" y="180" fill="#065F46" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800">ccuse</text>
  <text x="420" y="212" fill="#047857" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16">Claude Code provider/profile</text>
  <text x="420" y="240" fill="#047857" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="14">ark / kimi / claude / glm</text>

  <rect x="388" y="298" width="288" height="122" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="420" y="336" fill="#1E3A8A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800">codexuse</text>
  <text x="420" y="368" fill="#1D4ED8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16">Codex model/profile</text>
  <text x="420" y="396" fill="#1D4ED8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="14">gpt-5.5 / effort / verbosity</text>

  <path d="M676 203H744" stroke="#98A2B3" stroke-width="3" stroke-linecap="round"/>
  <path d="M734 193L746 203L734 213" stroke="#98A2B3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M676 359H744" stroke="#98A2B3" stroke-width="3" stroke-linecap="round"/>
  <path d="M734 349L746 359L734 369" stroke="#98A2B3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="768" y="128" width="288" height="62" rx="14" fill="#F9FAFB" stroke="#D0D5DD"/>
  <text x="796" y="166" fill="#111827" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">ccuse global ark</text>
  <rect x="768" y="204" width="288" height="62" rx="14" fill="#F9FAFB" stroke="#D0D5DD"/>
  <text x="796" y="242" fill="#111827" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">ccuse session ark -- ...</text>

  <rect x="768" y="284" width="288" height="62" rx="14" fill="#F9FAFB" stroke="#D0D5DD"/>
  <text x="796" y="322" fill="#111827" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">codexuse global gpt-5.5 high</text>
  <rect x="768" y="360" width="288" height="62" rx="14" fill="#F9FAFB" stroke="#D0D5DD"/>
  <text x="796" y="398" fill="#111827" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">codexuse session ... --proxy</text>

  <rect x="64" y="300" width="232" height="120" rx="16" fill="#FFFBEB" stroke="#FBBF24"/>
  <text x="92" y="336" fill="#92400E" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800">Warp / Terminal</text>
  <text x="92" y="366" fill="#B45309" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">不需要插件集成</text>
  <text x="92" y="394" fill="#B45309" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">PATH 配好后直接运行命令</text>
</svg>
